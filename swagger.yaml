openapi: 3.0.0
info:
  title: API Sistema Acadêmico
  description: Esta documentação guia a gestão de pessoas, cursos, categorias e matriculas na API
  version: 1.0.0
  contact:
    name: Guilherme Gomes
    email: guiigomes0734@gmail.com
  
servers:
  - url: http://localhost:3000/
    description: Servidor de Desenvolvimento Local

tags:
  - name: Pessoas
    description: Cadastro e gerenciamento de pessoas (alunos e docentes)
  - name: Categorias
    description: Cadastro e gerenciamento de categorias
  - name: Cursos
    description: Cadastro e gerenciamento de cursos
  - name: Matriculas
    description: Cadastro e gerenciamento de matriculas

paths:
  /pessoas:
    get:
      tags:
        - Pessoas
      summary: Busca os usuários ativos
      description: Retorna todos os usuários cadastrados (apenas usuários ativos no sistema)
      parameters:
        - name: nome
          required: false
          in: query
          description: Nome do usuário
          schema:
            type: string
        - name: email
          required: false
          in: query
          description: Email cadastrado do usuário
          schema:
            type: string
        - name: cpf
          required: false
          in: query
          description: CPF do usuário
          schema:
            type: string
        - name: role
          required: false
          in: query
          description: Função do usuário (estudante ou docente)
          schema:
            type: string
        - name: pagina
          required: false
          in: query
          description: Selecionar página/Filtrar por página
          schema:
            type: integer
        - name: limite
          required: false
          in: query
          description: Definir um limite de dados retornados por página
          schema:
            type: integer
        - name: ordem
          required: false
          in: query
          description: Definir ordem de retorno dos dados
          schema:
            type: string
            example: "id:asc"

      responses:
        "200":
          description: Lista de usuários retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PessoaResponse"
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
    post:
      tags:
        - Pessoas
      summary: Cadastra um novo usuário
      description: Cria um novo usuário a partir das informações enviadas na requisição
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PessoaRequest"
      responses:
        "201":
          description: Usuário cadastrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PessoaResponse"
        "400":
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos não são válidos"
                status: 400

        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
  /pessoas/todos:
    get:
      tags:
        - Pessoas
      summary: Busca todos os usuários
      description: Retorna todos os usuários cadastrados, sejam eles ativos ou inativos
      parameters:
        - name: nome
          required: false
          in: query
          description: Nome do usuário
          schema:
            type: string
        - name: email
          required: false
          in: query
          description: Email cadastrado do usuário
          schema:
            type: string
        - name: cpf
          required: false
          in: query
          description: CPF do usuário
          schema:
            type: string
        - name: role
          required: false
          in: query
          description: Função do usuário (estudante ou docente)
          schema:
            type: string
        - name: pagina
          required: false
          in: query
          description: Selecionar página/Filtrar por página
          schema:
            type: integer
        - name: limite
          required: false
          in: query
          description: Definir um limite de dados retornados por página
          schema:
            type: integer
        - name: ordem
          required: false
          in: query
          description: Definir ordem de retorno dos dados
          schema:
            type: string
            example: "id:asc"
      responses:
        "200":
          description: Lista de usuários retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PessoaResponse"
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
  /pessoas/{id}:
    get:
      tags:
        - Pessoas
      summary: Busca um usuário pelo ID
      description: Busca um usuário pelo ID (apenas usuários ativos no sistema)
      parameters:
        - name: id
          in: path
          required: true
          description: ID numérico do usuário
          schema:
            type: integer
        
      responses:
        "200":
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PessoaResponse"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                  message: "Um ou mais valores fornecidos estão incorretos"
                  status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
    put:
      tags:
        - Pessoas
      summary: Atualiza um usuário pelo ID
      description: Atualiza um usuário pelo ID a partir das informações enviadas na requisição (apenas usuários ativos no sistema)
      parameters:
        - name: id
          required: true
          in: path
          description: ID numérico do usuário
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PessoaRequest"
      responses:
        "200":
          description: "Registro atualizado com sucesso!"
          content:
            text/plain:
              schema:
                type: string
                example: "Registro atualizado com sucesso!"
        "400":
          description: Erro de validação ou ID com formato inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              examples:
                DadosInvalidos:
                  summary: Dados inválidos
                  value:
                    message: "Um ou mais valores fornecidos não são válidos"
                    status: 400
                idInvalido:
                  summary: "ID com formato inválido"
                  value:
                    message: "Um ou mais valores fornecidos estão incorretos"
                    status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
    delete:
      tags:
        - Pessoas
      summary: Deleta um usuário pelo ID
      description: Remove um usuário do sistema pelo ID (apenas usuários ativos no sistema)
      parameters:
        - name: id
          required: true
          in: path
          description: ID numérico do usuário
          schema:
            type: integer
      responses:
        "200":
          description: "Registro removido com sucesso!"
          content:
            text/plain:
              schema:
                type: string
                example: "Registro removido com sucesso!"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos estão incorretos"
                status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
  /pessoas/{estudante_id}/cancelar:
    put:
      tags:
        - Pessoas
      summary: Inativa um usuário e cancela suas matriculas
      description: Inativa o usuário no sistema e cancela todas suas respectivas matriculas ativas (apenas usuários ativos no sistema)
      parameters:
        - name: estudante_id
          required: true
          in: path
          description: ID numérico do usuário
          schema:
            type: integer
      responses:
        "200":
          description: "Estudante inativado e matrículas canceladas com sucesso!"
          content:
            text/plain:
              schema:
                type: string
                example: "Registro atualizado com sucesso!"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos estão incorretos"
                status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
  /pessoas/{estudante_id}/matriculas:
    get:
      tags:
        - Pessoas
      summary: Busca as matriculas de um usuário
      description: Busca todas as matriculas com status matriculado de um usuário pelo seu ID
      parameters:
        - name: estudante_id
          in: path
          required: true
          description: ID numérico do usuário
          schema:
            type: integer
        - name: pagina
          required: false
          in: query
          description: Selecionar página/Filtrar por página
          schema:
            type: integer
        - name: limite
          required: false
          in: query
          description: Definir um limite de dados retornados por página
          schema:
            type: integer
        - name: ordem
          required: false
          in: query
          description: Definir ordem de retorno dos dados
          schema:
            type: string
            example: "id:asc"
        
      responses:
        "200":
          description: Matriculas do usuário encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatriculaResponse"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos estão incorretos"
                status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
    post:
      tags:
        - Pessoas
      summary: Cadastra uma nova matricula de um usuário
      description: Cria uma nova matricula para um usuário pelo seu ID
      parameters:
        - name: estudante_id
          in: path
          required: true
          description: ID numérico do usuário
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatriculaRequest"
      responses:
        "201":
          description: Matricula cadastrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatriculaResponse"
        "400":
          description: Erro de validação ou violação de chave estrangeira ou ID com formato inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              examples:
                ViolacaoFK:
                  summary: Violação de chave estrangeira
                  value:
                    message: "Violação de chave estrangeira. Um ou mais valores informados não existem no sistema."
                    status: 400
                DadosInvalidos:
                  summary: Dados inválidos
                  value:
                    message: "Um ou mais valores fornecidos não são válidos"
                    status: 400
                idInvalido:
                  summary: "ID com formato inválido"
                  value:
                    message: "Um ou mais valores fornecidos estão incorretos"
                    status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse" 
  /pessoas/{estudante_id}/matriculas/todas:
