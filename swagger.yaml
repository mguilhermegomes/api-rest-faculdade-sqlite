        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
    put:
      tags:
        - Pessoas
      summary: Atualiza uma matricula de um usuário
      description: Atualiza uma matricula pelo seu ID de um usuário pelo seu ID
      parameters:
        - name: estudante_id
          in: path
          required: true
          description: ID numérico do usuário
          schema:
            type: integer
        - name: id
          in: path
          required: true
          description: ID numérico da matricula
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatriculaRequest"
      responses:
        "200":
          description: Matricula atualizada com sucesso!
          content:
            text/plain:
              schema:
                type: string
                example: "Registro atualizado com sucesso!"
        "400":
          description: Erro de validação ou violação de chave estrangeira ou ID com formato inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              examples:
                ViolacaoFK:
                  summary: Violação de chave estrangeira
                  value:
                    message: "Violação de chave estrangeira. Um ou mais valores informados não existem no sistema."
                    status: 400
                DadosInvalidos:
                  summary: Dados inválidos
                  value:
                    message: "Um ou mais valores fornecidos não são válidos"
                    status: 400
                idInvalido:
                  summary: "ID com formato inválido"
                  value:
                    message: "Um ou mais valores fornecidos estão incorretos"
                    status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
    delete:
      tags:
        - Pessoas
      summary: Deleta uma matricula de um usuário
      description: Remove uma matricula pelo seu ID de um usuário pelo seu ID do sistema
      parameters:
        - name: estudante_id
          required: true
          in: path
          description: ID numérico do usuário
          schema:
            type: integer
        - name: id
          in: path
          required: true
          description: ID numérico da matricula
          schema:
            type: integer
      responses:
        "200":
          description: "Registro removido com sucesso!"
          content:
            text/plain:
              schema:
                type: string
                example: "Registro removido com sucesso!"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos estão incorretos"
                status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
  /categorias:
    get:
      tags:
        - Categorias
      summary: Busca as categorias
      description: Retorna as categorias cadastradas no sistema
      parameters:
        - name: titulo
          required: false
          in: query
          description: Titulo da categoria
          schema:
            type: string
        - name: pagina
          required: false
          in: query
          description: Selecionar página/Filtrar por página
          schema:
            type: integer
        - name: limite
          required: false
          in: query
          description: Definir um limite de dados retornados por página
          schema:
            type: integer
        - name: ordem
          required: false
          in: query
          description: Definir ordem de retorno dos dados
          schema:
            type: string
            example: "id:asc"

      responses:
        "200":
          description: Lista de categorias retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoriaResponse"
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
    post:
      tags:
        - Categorias
      summary: Cadastra uma nova categoria
      description: Cria uma nova categoria a partir das informações enviadas na requisição
