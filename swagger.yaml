              schema:
                $ref: "#/components/schemas/ErroResponse"
  /pessoas/{estudante_id}/matriculas/{id}:
    get:
      tags:
        - Pessoas
      summary: Busca uma matricula de um usuário
      description: Busca uma matricula pelo seu ID de um usuário pelo seu ID
      parameters:
        - name: estudante_id
          in: path
          required: true
          description: ID numérico do usuário
          schema:
            type: integer
        - name: id
          in: path
          required: true
          description: ID numérico da matrícula
          schema:
            type: integer
        
      responses:
        "200":
          description: Matricula do usuário encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatriculaResponse"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
