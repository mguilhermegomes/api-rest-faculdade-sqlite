components:
  schemas:
    ErroResponse:
      type: object
      properties:
        message:
          type: string
          example: "Erro interno do servidor"
        status:
          type: integer
          example: 500

    SequelizeBase:
      type: object
      properties:
        id:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: "2026-05-17T01:36:26.247Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-23T03:23:48.624Z"
        deletedAt:
          type: string
          format: date-time
          nullable: true
          example: null

    PessoaRequest:
      type: object
      required:
        - nome
        - email
        - cpf
        - ativo
        - role
      properties:
        nome:
          type: string
          example: "Solange Estudante"
        email:
          type: string
          example: "solange@email.com"
        cpf:
          type: string
          example: "63058133022"
        ativo:
          type: boolean
          example: true
        role:
          type: string
          example: "estudante"

    PessoaResponse:
      allOf:
        - $ref: "#/components/schemas/PessoaRequest"
        - $ref: "#/components/schemas/SequelizeBase"
    
    CategoriaRequest:
      type: object
      required:
        - titulo
      properties:
        titulo:
          type: string
          example: "Node.js"

    CategoriaResponse:
      allOf:
        - $ref: "#/components/schemas/CategoriaRequest"
        - $ref: "#/components/schemas/SequelizeBase"
    
    CursoRequest:
      type: object
      required:
        - titulo
        - data_inicio
        - categoria_id
        - docente_id
      properties:
        titulo:
          type: string
          example: "API com Express"
        data_inicio:
          type: string
          format: date
          example: "2023-01-01"
        categoria_id:
          type: integer
          description: "ID da categoria do curso (FK)"
          example: 1
        docente_id:
          type: integer
          description: "ID do docente do curso (FK)"
          example: 5
    
    CursoResponse:
      allOf:
        - $ref: "#/components/schemas/CursoRequest"
        - $ref: "#/components/schemas/SequelizeBase"

    MatriculaRequest:
      type: object
      required:
        - curso_id
        - status
      properties:
        curso_id:
          type: integer
          description: "ID do curso da matricula (FK)"
          example: 1
        status:
          type: string
          example: "matriculado"

    MatriculaRequestToResponse:
      type: object
      required:
        - estudante_id
        - curso_id
        - status
      properties:
        estudante_id:
          type: integer
          description: "ID do estudante (FK)"
          example: 1
        curso_id:
          type: integer
          description: "ID do curso da matricula (FK)"
          example: 1
        status:
          type: string
          example: "matriculado"

    MatriculaResponse:
      allOf:
        - $ref: "#/components/schemas/MatriculaRequestToResponse"
        - $ref: "#/components/schemas/SequelizeBase"