          description: Selecionar página/Filtrar por página
          schema:
            type: integer
        - name: limite
          required: false
          in: query
          description: Definir um limite de dados retornados por página
          schema:
            type: integer
        - name: ordem
          required: false
          in: query
          description: Definir ordem de retorno dos dados
          schema:
            type: string
            example: "id:asc"
        
      responses:
        "200":
          description: Matriculas do usuário encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatriculaResponse"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos estão incorretos"
                status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
  /pessoas/{estudante_id}/matriculas/canceladas:
    get:
      tags:
        - Pessoas
      summary: Busca as matriculas canceladas de um usuário
      description: Busca todas as matriculas com status cancelado de um usuário pelo seu ID
      parameters:
        - name: estudante_id
          in: path
          required: true
          description: ID numérico do usuário
          schema:
            type: integer
        - name: pagina
          required: false
          in: query
          description: Selecionar página/Filtrar por página
          schema:
            type: integer
        - name: limite
          required: false
          in: query
          description: Definir um limite de dados retornados por página
          schema:
            type: integer
        - name: ordem
          required: false
          in: query
          description: Definir ordem de retorno dos dados
          schema:
            type: string
            example: "id:asc"
        
      responses:
        "200":
          description: Matriculas do usuário encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatriculaResponse"
        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos estão incorretos"
                status: 400
        "404":
          description: "ID inexistente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: ID fornecido não encontrado
                status: 404
        "500":
          description: "Erro interno do servidor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
  /pessoas/{estudante_id}/matriculas/total-confirmadas:
    get:
      tags:
        - Pessoas
      summary: Busca e conta as matriculas de um usuário
      description: Busca e conta todas as matriculas com status matriculado de um usuário pelo seu ID
      parameters:
        - name: estudante_id
          in: path
          required: true
          description: ID numérico do usuário
          schema:
            type: integer
        - name: pagina
          required: false
          in: query
          description: Selecionar página/Filtrar por página
          schema:
            type: integer
        - name: limite
          required: false
          in: query
          description: Definir um limite de dados retornados por página
          schema:
            type: integer
        - name: ordem
          required: false
          in: query
          description: Definir ordem de retorno dos dados
          schema:
            type: string
            example: "id:asc"
        
      responses:
        "200":
          description: Matriculas do usuário encontradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 1
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatriculaResponse"

        "400":
          description: "ID com formato inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResponse"
              example:
                message: "Um ou mais valores fornecidos estão incorretos"
